<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崧鶴排班系統</title>
    
    <!-- 1. 引入 Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. 引入 React 和 ReactDOM (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- 3. 引入 Babel 用於解析 JSX (CDN) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        /* 增加拖曳時的視覺回饋 */
        .cursor-move { cursor: move; cursor: grab; }
        .cursor-move:active { cursor: grabbing; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 4. 內建圖示組件 ---
        const IconWrapper = ({ children, color = "currentColor", size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );

        const CalendarIcon = (props) => <IconWrapper {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></IconWrapper>;
        const UserIcon = (props) => <IconWrapper {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconWrapper>;
        const UsersIcon = (props) => <IconWrapper {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
        const ShieldAlertIcon = (props) => <IconWrapper {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconWrapper>;
        const CheckCircleIcon = (props) => <IconWrapper {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
        const Trash2Icon = (props) => <IconWrapper {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconWrapper>;
        const PlusIcon = (props) => <IconWrapper {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconWrapper>;
        const RefreshCwIcon = (props) => <IconWrapper {...props}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></IconWrapper>;
        const SettingsIcon = (props) => <IconWrapper {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;
        const MoonIcon = (props) => <IconWrapper {...props}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></IconWrapper>;
        const BarChart3Icon = (props) => <IconWrapper {...props}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></IconWrapper>;
        const CoffeeIcon = (props) => <IconWrapper {...props}><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></IconWrapper>;
        const BriefcaseIcon = (props) => <IconWrapper {...props}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconWrapper>;
        const ChevronLeftIcon = (props) => <IconWrapper {...props}><path d="m15 18-6-6 6-6"/></IconWrapper>;
        const ChevronRightIcon = (props) => <IconWrapper {...props}><path d="m9 18 6-6-6-6"/></IconWrapper>;

        // --- 5. 初始模擬資料 (已移除 洪湘葳) ---
        const INITIAL_STAFF = [
            { id: 1, name: '王世通', role: 'mortician', preferredOff: [], designatedShifts: [] },
            { id: 2, name: '劉宗坤', role: 'mortician', preferredOff: [], designatedShifts: [] },
            { id: 3, name: '劉春榮', role: 'mortician', preferredOff: [], designatedShifts: [] },
            { id: 4, name: '陳柏融', role: 'mortician', preferredOff: [], designatedShifts: [] },
            { id: 5, name: '胡智欽', role: 'mortician', preferredOff: [], designatedShifts: [] },
            { id: 6, name: '王勇在', role: 'mortician', preferredOff: [], designatedShifts: [] },
            { id: 7, name: '馬育謙', role: 'mortician', preferredOff: [], designatedShifts: [] },
            { id: 9, name: '林俊宇', role: 'assistant', preferredOff: [], designatedShifts: [] },
            { id: 10, name: '童淙鈿', role: 'assistant', preferredOff: [], designatedShifts: [] },
            { id: 11, name: '劉惠婷', role: 'assistant', preferredOff: [], designatedShifts: [] },
            { id: 12, name: '徐暐智', role: 'assistant', preferredOff: [], designatedShifts: [] },
            { id: 13, name: '李瀚雅', role: 'assistant', preferredOff: [], designatedShifts: [] },
            { id: 14, name: '謝汶佳', role: 'assistant', preferredOff: [], designatedShifts: [] },
        ];

        // --- 台灣假日資料 (完整版 2024-2035) ---
        const getTaiwanHoliday = (year, month, day) => {
            // 固定國定假日 (month 是 0-based: 0=1月, 1=2月...)
            if (month === 0 && day === 1) return '元旦';
            if (month === 1 && day === 28) return '和平紀念日';
            if (month === 3 && day === 4) return '兒童節';
            if (month === 3 && day === 5) return '清明節';
            if (month === 4 && day === 1) return '勞動節';
            if (month === 9 && day === 10) return '國慶日';
            
            // 農曆變動假日對照表 (Key格式: YYYY-M-D, M為0-based)
            const lunarHolidays = {
                // 2026 (馬年)
                '2026-1-16': '小年夜', '2026-1-17': '除夕', '2026-1-18': '春節', '2026-1-19': '初二', '2026-1-20': '初三', '2026-1-21': '初四', '2026-1-22': '初五',
                '2026-5-19': '端午節', '2026-8-25': '中秋節',

                // 2027 (羊年)
                '2027-1-5': '小年夜', '2027-1-6': '除夕', '2027-1-7': '春節', '2027-1-8': '初二', '2027-1-9': '初三', '2027-1-10': '初四', '2027-1-11': '初五',
                '2027-5-9': '端午節', '2027-8-15': '中秋節',

                // 2028 (猴年)
                '2028-0-25': '小年夜', '2028-0-26': '除夕', '2028-0-27': '春節', '2028-0-28': '初二', '2028-0-29': '初三', '2028-0-30': '初四', '2028-0-31': '初五',
                '2028-4-28': '端午節', '2028-9-3': '中秋節',

                // 2029 (雞年)
                '2029-1-12': '小年夜', '2029-1-13': '除夕', '2029-1-14': '春節', '2029-1-15': '初二', '2029-1-16': '初三', '2029-1-17': '初四', '2029-1-18': '初五',
                '2029-5-16': '端午節', '2029-8-22': '中秋節',

                // 2030 (狗年)
                '2030-1-1': '小年夜', '2030-1-2': '除夕', '2030-1-3': '春節', '2030-1-4': '初二', '2030-1-5': '初三', '2030-1-6': '初四', '2030-1-7': '初五',
                '2030-5-5': '端午節', '2030-8-12': '中秋節',

                // 2031 (豬年)
                '2031-0-22': '小年夜', '2031-0-23': '除夕', '2031-0-24': '春節', '2031-0-25': '初二', '2031-0-26': '初三', '2031-0-27': '初四', '2031-0-28': '初五',
                '2031-5-24': '端午節', '2031-9-1': '中秋節',

                // 2032 (鼠年)
                '2032-1-10': '小年夜', '2032-1-11': '除夕', '2032-1-12': '春節', '2032-1-13': '初二', '2032-1-14': '初三', '2032-1-15': '初四', '2032-1-16': '初五',
                '2032-5-12': '端午節', '2032-8-19': '中秋節',

                // 2033 (牛年)
                '2033-0-30': '小年夜', '2033-0-31': '除夕', '2033-1-1': '春節', '2033-1-2': '初二', '2033-1-3': '初三', '2033-1-4': '初四', '2033-1-5': '初五',
                '2033-5-1': '端午節', '2033-8-8': '中秋節',

                // 2034 (虎年)
                '2034-1-18': '小年夜', '2034-1-19': '除夕', '2034-1-20': '春節', '2034-1-21': '初二', '2034-1-22': '初三', '2034-1-23': '初四', '2034-1-24': '初五',
                '2034-5-20': '端午節', '2034-8-27': '中秋節',

                // 2035 (兔年)
                '2035-1-7': '小年夜', '2035-1-8': '除夕', '2035-1-9': '春節', '2035-1-10': '初二', '2035-1-11': '初三', '2035-1-12': '初四', '2035-1-13': '初五',
                '2035-5-10': '端午節', '2035-8-16': '中秋節',
            };
            return lunarHolidays[`${year}-${month}-${day}`];
        };

        const App = () => {
            // --- 狀態管理 ---
            const [staffList, setStaffList] = useState(INITIAL_STAFF);
            const [currentDate, setCurrentDate] = useState(new Date());
            const [schedule, setSchedule] = useState({});
            const [logs, setLogs] = useState([]);
            const [activeTab, setActiveTab] = useState('calendar'); 
            const [stats, setStats] = useState([]);
            const [autoAdjustMode, setAutoAdjustMode] = useState(false); // 新增：連動調整模式

            const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            // --- 重新計算統計資料 (為了支援拖曳後的即時更新) ---
            const calculateStats = (currentSchedule, currentStaffList) => {
                let newStats = currentStaffList.map(s => ({
                    ...s,
                    offCount: 0,
                    nightShiftCount: 0,
                    haizongCount: 0,
                    gaoyiCount: 0,
                    recallCount: 0,
                }));

                Object.values(currentSchedule).forEach(dayData => {
                    if (!dayData) return;

                    (dayData.nightShift['海總'] || []).forEach(s => {
                        const stat = newStats.find(st => st.id === s.id);
                        if (stat) { stat.haizongCount++; stat.nightShiftCount++; }
                    });
                    
                    (dayData.nightShift['高醫'] || []).forEach(s => {
                        const stat = newStats.find(st => st.id === s.id);
                        if (stat) { stat.gaoyiCount++; stat.nightShiftCount++; }
                    });

                    (dayData.off || []).forEach(s => {
                        const stat = newStats.find(st => st.id === s.id);
                        if (stat) { stat.offCount++; }
                    });

                    (dayData.recall || []).forEach(s => {
                        const stat = newStats.find(st => st.id === s.id);
                        if (stat) { stat.recallCount++; } 
                    });
                });

                return newStats;
            };

            const updateScheduleAndStats = (newSchedule) => {
                setSchedule(newSchedule);
                setStats(calculateStats(newSchedule, staffList));
            };

            // --- 年月切換邏輯 ---
            const changeMonth = (offset) => {
                const newDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + offset, 1);
                setCurrentDate(newDate);
                setSchedule({}); setStats([]); setLogs([]);
            };
            const handleYearChange = (e) => {
                setCurrentDate(new Date(parseInt(e.target.value), currentDate.getMonth(), 1));
                setSchedule({}); setStats([]); setLogs([]);
            };
            const handleMonthChange = (e) => {
                setCurrentDate(new Date(currentDate.getFullYear(), parseInt(e.target.value), 1));
                setSchedule({}); setStats([]); setLogs([]);
            };

            // --- 統計某日之前的所有數據 (用於連動調整時的基礎重建) ---
            const buildStatsUpToDay = (currentSchedule, upToDay, currentStaffList) => {
                let currentStats = currentStaffList.map(s => ({ 
                    ...s, offCount: 0, nightShiftCount: 0, haizongCount: 0, gaoyiCount: 0, consecutiveWork: 0, lastWorkDay: -10 
                }));

                for (let d = 1; d <= upToDay; d++) {
                    const dayAssign = currentSchedule[d];
                    if (!dayAssign) {
                        currentStats.forEach(s => s.consecutiveWork = 0);
                        continue;
                    }

                    const hz = dayAssign.nightShift['海總'] || [];
                    const gy = dayAssign.nightShift['高醫'] || [];
                    const off = dayAssign.off || [];
                    const workingIds = [...hz, ...gy].map(s => s.id);

                    off.forEach(s => {
                        const idx = currentStats.findIndex(st => st.id === s.id);
                        if (idx > -1) {
                            currentStats[idx].offCount++;
                            currentStats[idx].consecutiveWork = 0;
                        }
                    });

                    [...hz, ...gy].forEach(s => {
                        const idx = currentStats.findIndex(st => st.id === s.id);
                        if (idx > -1) {
                            currentStats[idx].nightShiftCount++;
                            currentStats[idx].consecutiveWork++;
                            currentStats[idx].lastWorkDay = d;
                            if (hz.some(h => h.id === s.id)) currentStats[idx].haizongCount++;
                            else currentStats[idx].gaoyiCount++;
                        }
                    });

                    currentStats.forEach(s => {
                        if (!workingIds.includes(s.id) && !off.some(o => o.id === s.id)) {
                            const idx = currentStats.findIndex(st => st.id === s.id);
                            if (idx > -1) currentStats[idx].consecutiveWork = 0; 
                        }
                    });
                }
                return currentStats;
            };

            // --- 從特定日期開始排班 (支援全自動 或 拖曳後的局部重算) ---
            const generateScheduleFrom = (baseSchedule, startDay, showAlert = true) => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const daysInMonth = getDaysInMonth(year, month);
                let newSchedule = { ...baseSchedule };
                let processLogs = [];

                // 清除從 startDay 開始的舊排班，準備重算
                for (let d = startDay; d <= daysInMonth; d++) {
                    delete newSchedule[d];
                }

                let staffStats = buildStatsUpToDay(newSchedule, startDay - 1, staffList);

                const shuffle = (array) => {
                    let arr = [...array];
                    for (let i = arr.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [arr[i], arr[j]] = [arr[j], arr[i]];
                    }
                    return arr;
                };

                const STANDARD_LEAVE_LIMIT = 5; 

                for (let day = startDay; day <= daysInMonth; day++) {
                    let dailyAssignment = {
                        nightShift: { '海總': [], '高醫': [] },
                        off: [],
                        standby: [],
                        recall: [] // 新增召回陣列
                    };

                    const currentUsedLeaves = staffStats.reduce((sum, s) => sum + s.offCount, 0);
                    const targetTotalLeaves = staffList.length * STANDARD_LEAVE_LIMIT;
                    const remainingDays = daysInMonth - day + 1;
                    
                    let targetOffCount = 0;
                    if (remainingDays > 0) {
                        targetOffCount = Math.ceil((targetTotalLeaves - currentUsedLeaves) / remainingDays);
                    }
                    if (targetOffCount < 2) targetOffCount = 2; 

                    // --- 解析當日指定值班 ---
                    let designatedHz = [];
                    let designatedGy = [];
                    let designatedStandby = [];
                    staffStats.forEach(s => {
                        const dShift = s.designatedShifts?.find(ds => ds.date === day);
                        if (dShift) {
                            if (dShift.location === '海總') designatedHz.push(s);
                            if (dShift.location === '高醫') designatedGy.push(s);
                            if (dShift.location === '待命') designatedStandby.push(s);
                        }
                    });
                    
                    // --- 決定今日休假 ---
                    let mandatoryOff = staffStats.filter(s => {
                        const isDesignatedToday = s.designatedShifts?.some(ds => ds.date === day);
                        if (isDesignatedToday) return false; // 指定排班/待命優先，當日不可休
                        
                        if (s.preferredOff.includes(day)) return true;
                        
                        // 嚴格確保5天休假：若剩下可排休天數剛好等於缺的假，且今日沒被指定值班，強制排休
                        if (s.offCount < STANDARD_LEAVE_LIMIT) {
                            let availableFutureDays = 0;
                            for (let d = day; d <= daysInMonth; d++) {
                                if (!s.designatedShifts?.some(ds => ds.date === d)) availableFutureDays++;
                            }
                            if (availableFutureDays <= (STANDARD_LEAVE_LIMIT - s.offCount)) return true;
                        }
                        return false;
                    });

                    let candidatesForOff = staffStats.filter(s => {
                        if (mandatoryOff.some(m => m.id === s.id)) return false;
                        if (s.designatedShifts?.some(ds => ds.date === day)) return false; // 指定排班不可休
                        if (s.lastWorkDay === day - 1) return false; // 昨天值班，今天盡量不隨機休
                        
                        const futurePreferred = s.preferredOff.filter(d => d > day).length;
                        const projectedTotal = s.offCount + futurePreferred;
                        const myLimit = Math.max(STANDARD_LEAVE_LIMIT, s.preferredOff.length);
                        if (projectedTotal >= myLimit) return false;
                        return true;
                    });

                    candidatesForOff.sort((a, b) => {
                        const futureA = a.preferredOff.filter(d => d > day).length;
                        const projectedA = a.offCount + futureA;
                        const futureB = b.preferredOff.filter(d => d > day).length;
                        const projectedB = b.offCount + futureB;
                        if (projectedA !== projectedB) return projectedA - projectedB;
                        return Math.random() - 0.5;
                    });

                    let currentOffList = [...mandatoryOff];
                    let needed = Math.max(0, targetOffCount - currentOffList.length);
                    
                    for (let i = 0; i < needed; i++) {
                        if (candidatesForOff.length > 0) {
                            currentOffList.push(candidatesForOff.shift());
                        } else break; 
                    }

                    dailyAssignment.off = currentOffList;
                    currentOffList.forEach(s => {
                        const idx = staffStats.findIndex(st => st.id === s.id);
                        staffStats[idx].offCount++;
                        staffStats[idx].consecutiveWork = 0; 
                    });

                    // --- 分配夜班 ---
                    let eligibleForNight = staffStats.filter(s => {
                        if (currentOffList.some(off => off.id === s.id)) return false;
                        if (designatedHz.some(d => d.id === s.id) || designatedGy.some(d => d.id === s.id)) return false; // 已在指定名單
                        if (designatedStandby.some(d => d.id === s.id)) return false; // 指定待命，不可排夜班
                        if (s.preferredOff.includes(day + 1)) return false;
                        if (s.consecutiveWork >= 2) return false; // 嚴格限制：最多連2天 (指定值班者不受此限)
                        return true;
                    });

                    const sortForBalance = (arr, locField) => {
                        let temp = shuffle(arr);
                        return temp.sort((a, b) => {
                            if (a.nightShiftCount !== b.nightShiftCount) return a.nightShiftCount - b.nightShiftCount;
                            return a[locField] - b[locField];
                        });
                    };

                    let morticians = eligibleForNight.filter(s => s.role === 'mortician');
                    
                    morticians = sortForBalance(morticians, 'haizongCount');
                    const hzStrictMortsNeeded = Math.max(0, 2 - designatedHz.filter(s => s.role === 'mortician').length);
                    const hzStrictMorts = morticians.splice(0, hzStrictMortsNeeded);
                    
                    morticians = sortForBalance(morticians, 'gaoyiCount');
                    const gyStrictMortsNeeded = Math.max(0, 1 - designatedGy.filter(s => s.role === 'mortician').length);
                    const gyStrictMorts = morticians.splice(0, gyStrictMortsNeeded);

                    let assistants = eligibleForNight.filter(s => s.role === 'assistant');
                    let supportPool = [...morticians, ...assistants];

                    supportPool = sortForBalance(supportPool, 'haizongCount');
                    const hzSupportNeeded = Math.max(0, 4 - designatedHz.length - hzStrictMorts.length);
                    const hzSupport = supportPool.splice(0, hzSupportNeeded);

                    supportPool = sortForBalance(supportPool, 'gaoyiCount');
                    const gySupportNeeded = Math.max(0, 2 - designatedGy.length - gyStrictMorts.length);
                    const gySupport = supportPool.splice(0, gySupportNeeded);

                    const hzTeam = [...designatedHz, ...hzStrictMorts, ...hzSupport];
                    const gyTeam = [...designatedGy, ...gyStrictMorts, ...gySupport];

                    dailyAssignment.nightShift['海總'] = hzTeam;
                    dailyAssignment.nightShift['高醫'] = gyTeam;

                    const workingIds = [...hzTeam, ...gyTeam].map(s => s.id);
                    
                    [...hzTeam, ...gyTeam].forEach(s => {
                        const idx = staffStats.findIndex(st => st.id === s.id);
                        staffStats[idx].nightShiftCount++;
                        staffStats[idx].consecutiveWork++; 
                        staffStats[idx].lastWorkDay = day;
                        
                        if (dailyAssignment.nightShift['海總'].some(h => h.id === s.id)) staffStats[idx].haizongCount++;
                        else staffStats[idx].gaoyiCount++;
                    });

                    staffStats.forEach(s => {
                        if (!workingIds.includes(s.id) && !currentOffList.some(o => o.id === s.id)) {
                            const idx = staffStats.findIndex(st => st.id === s.id);
                            staffStats[idx].consecutiveWork = 0; 
                            dailyAssignment.standby.push(s);
                        }
                    });

                    if (hzTeam.length < 4) processLogs.push(`Day ${day}: 海總人力不足 (現${hzTeam.length}/需4)`);
                    if (gyTeam.length < 2) processLogs.push(`Day ${day}: 高醫人力不足 (現${gyTeam.length}/需2)`);
                    
                    newSchedule[day] = dailyAssignment;
                }

                setLogs(prev => startDay === 1 ? processLogs : [...prev, ...processLogs]);
                updateScheduleAndStats(newSchedule);
                
                if (showAlert) {
                    if(processLogs.length === 0) alert("排班完成！\n已保證每人至少5天假，且正常排班連續不超過2天。");
                    else alert("排班完成，但有部分異常（請查看系統訊息並手動微調）。");
                }
            };

            const generateSchedule = () => generateScheduleFrom({}, 1, true);

            // --- 拖曳功能事件 (Drag and Drop) ---
            const handleDragStart = (e, day, category, staffId) => {
                e.dataTransfer.setData('application/json', JSON.stringify({ day, category, staffId }));
                setTimeout(() => e.target.style.opacity = '0.5', 0); // 拖曳時半透明
            };

            const handleDragEnd = (e) => {
                e.target.style.opacity = '1';
            };

            const handleDrop = (e, targetDay, targetCategory) => {
                e.preventDefault();
                const dataString = e.dataTransfer.getData('application/json');
                if (!dataString) return;
                
                try {
                    const { day: sourceDay, category: sourceCategory, staffId } = JSON.parse(dataString);
                    
                    // --- 新增防呆限制：嚴禁跨天拖曳人員 ---
                    if (sourceDay !== targetDay) {
                        alert("⚠️ 防呆限制：只能在「同一天」內的各區域互相調動，不允許將人員跨日拖曳！");
                        return;
                    }

                    if (sourceDay === targetDay && sourceCategory === targetCategory) return;

                    let newSchedule = { ...schedule };
                    newSchedule[sourceDay] = JSON.parse(JSON.stringify(newSchedule[sourceDay]));

                    const getListRef = (dayObj, cat) => {
                        if (!dayObj) return null;
                        switch(cat) {
                            case 'haizong': return dayObj.nightShift['海總'];
                            case 'gaoyi': return dayObj.nightShift['高醫'];
                            case 'standby': return dayObj.standby;
                            case 'off': return dayObj.off;
                            case 'recall': 
                                if (!dayObj.recall) dayObj.recall = [];
                                return dayObj.recall;
                            default: return null;
                        }
                    };

                    const sourceList = getListRef(newSchedule[sourceDay], sourceCategory);
                    const targetList = getListRef(newSchedule[targetDay], targetCategory);

                    if (!sourceList || !targetList) return;

                    const staffIndex = sourceList.findIndex(s => s.id === staffId);
                    if (staffIndex === -1) return;

                    // 取出被拖曳的員工
                    const [staffMember] = sourceList.splice(staffIndex, 1);
                    
                    // 防呆：同一天內先把他從其他名單中剔除（避免分身）
                    const categories = ['haizong', 'gaoyi', 'standby', 'off', 'recall'];
                    categories.forEach(cat => {
                        const list = getListRef(newSchedule[targetDay], cat);
                        if (list) {
                            const idx = list.findIndex(s => s.id === staffMember.id);
                            if (idx !== -1) list.splice(idx, 1);
                        }
                    });

                    // 放入目標區域
                    targetList.push(staffMember);
                    
                    // 若開啟連動調整，則從變動發生的隔天開始自動重排
                    const regenDay = targetDay + 1;
                    if (autoAdjustMode && regenDay <= getDaysInMonth(currentDate.getFullYear(), currentDate.getMonth())) {
                        generateScheduleFrom(newSchedule, regenDay, false);
                    } else {
                        updateScheduleAndStats(newSchedule);
                    }

                } catch (err) { console.error("Drop error", err); }
            };

            // --- 隨機召回放假人員 ---
            const handleRandomRecall = (day) => {
                let newSchedule = { ...schedule };
                newSchedule[day] = JSON.parse(JSON.stringify(newSchedule[day]));
                
                const offList = newSchedule[day].off;
                if (!offList || offList.length === 0) {
                    alert("今日無休假人員可供抽籤召回！");
                    return;
                }
                
                if (!newSchedule[day].recall) newSchedule[day].recall = [];

                // 隨機抽取一位
                const randomIndex = Math.floor(Math.random() * offList.length);
                const [recalledStaff] = offList.splice(randomIndex, 1);
                
                newSchedule[day].recall.push(recalledStaff);
                
                // 召回導致休假改變，若開啟連動調整，從明天開始重排補假
                if (autoAdjustMode && day < getDaysInMonth(currentDate.getFullYear(), currentDate.getMonth())) {
                    generateScheduleFrom(newSchedule, day + 1, false);
                } else {
                    updateScheduleAndStats(newSchedule);
                }
            };

            // --- 人員管理 ---
            const handleAddStaff = (name, role) => setStaffList([...staffList, { id: Date.now(), name, role, preferredOff: [], designatedShifts: [] }]);
            const handleRemoveStaff = (id) => setStaffList(staffList.filter(s => s.id !== id));
            const togglePreferredOff = (staffId, day) => {
                setStaffList(staffList.map(s => {
                    if (s.id !== staffId) return s;
                    const currentOff = s.preferredOff;
                    if (currentOff.includes(day)) return { ...s, preferredOff: currentOff.filter(d => d !== day) };
                    if (currentOff.length >= 6) { alert("每人每月最多選擇 6 天自選假"); return s; }
                    return { ...s, preferredOff: [...currentOff, day] };
                }));
            };

            const addDesignatedShift = (staffId, date, location) => {
                setStaffList(staffList.map(s => {
                    if (s.id !== staffId) return s;
                    const currentDS = s.designatedShifts || [];
                    const filteredDS = currentDS.filter(ds => ds.date !== date);
                    return { ...s, designatedShifts: [...filteredDS, { date, location }] };
                }));
            };

            const removeDesignatedShift = (staffId, date) => {
                setStaffList(staffList.map(s => {
                    if (s.id !== staffId) return s;
                    return { ...s, designatedShifts: (s.designatedShifts || []).filter(ds => ds.date !== date) };
                }));
            };

            // --- 渲染行事曆 ---
            const renderCalendar = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const daysInMonth = getDaysInMonth(year, month);
                const firstDay = getFirstDayOfMonth(year, month);
                const blanks = Array(firstDay).fill(null);
                const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);

                return (
                    <div className="grid grid-cols-7 gap-2">
                        {['日', '一', '二', '三', '四', '五', '六'].map(d => (
                            <div key={d} className="text-center font-bold text-gray-600 p-2 bg-gray-100 rounded">{d}</div>
                        ))}
                        {blanks.map((_, i) => <div key={`blank-${i}`} className="h-32 bg-gray-50/50 rounded" />)}
                        {days.map(day => {
                            const daySchedule = schedule[day];
                            const dateObj = new Date(year, month, day);
                            const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
                            const holidayName = getTaiwanHoliday(year, month, day);

                            return (
                                <div key={day} className={`min-h-[190px] border rounded p-1 text-xs relative flex flex-col ${isWeekend ? 'bg-orange-50' : 'bg-white'}`}>
                                    <div className="flex justify-between items-center mb-1 border-b pb-1">
                                        <div className="flex items-center gap-2">
                                            <span className="font-bold text-base text-gray-700 ml-1">{day}</span>
                                            {holidayName && (
                                                <span className="text-[10px] bg-red-100 text-red-600 px-1 rounded border border-red-200">{holidayName}</span>
                                            )}
                                        </div>
                                        {daySchedule && daySchedule.off.length >= 1 ? 
                                            <CheckCircleIcon size={14} className="text-green-500" /> : 
                                            daySchedule && <ShieldAlertIcon size={14} className="text-red-500" />
                                        }
                                    </div>
                                    
                                    {daySchedule ? (
                                        <div className="flex-1 flex flex-col gap-1">
                                            {/* 夜班區域 (支援拖曳) */}
                                            <div className="bg-slate-800 text-white p-1 rounded shadow-sm">
                                                <div className="flex items-center gap-1 font-bold mb-1 text-yellow-300 border-b border-slate-600 pb-1">
                                                    <MoonIcon size={10} /> 夜班
                                                </div>
                                                <div className="mb-1">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-[10px] text-blue-200">海總 ({daySchedule.nightShift['海總'].length})</span>
                                                    </div>
                                                    <div 
                                                        className="flex flex-wrap gap-1 min-h-[16px] p-0.5 rounded border border-transparent hover:border-dashed hover:border-gray-400 bg-slate-700/50 transition-colors"
                                                        onDragOver={(e) => e.preventDefault()}
                                                        onDrop={(e) => handleDrop(e, day, 'haizong')}
                                                    >
                                                        {daySchedule.nightShift['海總'].map(s => (
                                                            <span 
                                                                key={s.id} draggable 
                                                                onDragStart={(e) => handleDragStart(e, day, 'haizong', s.id)} onDragEnd={handleDragEnd}
                                                                className={`text-[10px] px-1 rounded text-black cursor-move shadow-sm ${s.role==='mortician'?'bg-purple-200':'bg-cyan-200'}`}
                                                            >{s.name}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div>
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-[10px] text-green-200">高醫 ({daySchedule.nightShift['高醫'].length})</span>
                                                    </div>
                                                    <div 
                                                        className="flex flex-wrap gap-1 min-h-[16px] p-0.5 rounded border border-transparent hover:border-dashed hover:border-gray-400 bg-slate-700/50 transition-colors"
                                                        onDragOver={(e) => e.preventDefault()}
                                                        onDrop={(e) => handleDrop(e, day, 'gaoyi')}
                                                    >
                                                        {daySchedule.nightShift['高醫'].map(s => (
                                                            <span 
                                                                key={s.id} draggable 
                                                                onDragStart={(e) => handleDragStart(e, day, 'gaoyi', s.id)} onDragEnd={handleDragEnd}
                                                                className={`text-[10px] px-1 rounded text-black cursor-move shadow-sm ${s.role==='mortician'?'bg-purple-200':'bg-cyan-200'}`}
                                                            >{s.name}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>

                                            {/* 待命區域 (支援拖曳) */}
                                            <div className="bg-blue-50 p-1 rounded border border-blue-100 flex-1">
                                                <div className="text-[10px] text-blue-800 font-bold mb-1 flex items-center gap-1">
                                                    <BriefcaseIcon size={10}/> 待命 ({daySchedule.standby.length})
                                                </div>
                                                <div 
                                                    className="flex flex-wrap gap-1 min-h-[20px] p-0.5 rounded border border-transparent hover:border-dashed hover:border-blue-300 transition-colors"
                                                    onDragOver={(e) => e.preventDefault()}
                                                    onDrop={(e) => handleDrop(e, day, 'standby')}
                                                >
                                                    {daySchedule.standby.map(s => (
                                                        <span 
                                                            key={s.id} draggable 
                                                            onDragStart={(e) => handleDragStart(e, day, 'standby', s.id)} onDragEnd={handleDragEnd}
                                                            className={`text-[10px] px-1 rounded border cursor-move shadow-sm ${s.preferredOff.includes(day+1) ? 'bg-orange-100 border-orange-200 text-orange-700 font-bold' : 'bg-white border-blue-100 text-gray-600'}`}
                                                        >
                                                            {s.name} {s.preferredOff.includes(day+1) && '(休前)'}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* 召回區域 (新增，支援拖曳) */}
                                            {(daySchedule.recall && daySchedule.recall.length > 0) && (
                                                <div className="bg-orange-50 p-1 rounded border border-orange-200">
                                                    <div className="text-[10px] text-orange-600 font-bold mb-1 flex items-center gap-1">
                                                        <ShieldAlertIcon size={10}/> 召回 ({daySchedule.recall.length})
                                                    </div>
                                                    <div 
                                                        className="flex flex-wrap gap-1 min-h-[16px] p-0.5 rounded border border-transparent hover:border-dashed hover:border-orange-300 transition-colors"
                                                        onDragOver={(e) => e.preventDefault()}
                                                        onDrop={(e) => handleDrop(e, day, 'recall')}
                                                    >
                                                        {daySchedule.recall.map(s => (
                                                            <span 
                                                                key={s.id} draggable 
                                                                onDragStart={(e) => handleDragStart(e, day, 'recall', s.id)} onDragEnd={handleDragEnd}
                                                                className="text-[10px] px-1 bg-orange-200 text-orange-800 rounded border border-orange-300 cursor-move shadow-sm"
                                                            >{s.name}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {/* 休假區域 (新增抽籤按鈕，支援拖曳) */}
                                            <div className="mt-auto pt-1 bg-red-50/40 p-1 rounded border border-red-50">
                                                <div className="flex justify-between items-center mb-1">
                                                    <div className="text-[10px] text-red-500 flex items-center gap-1 font-bold">
                                                        <CoffeeIcon size={10}/> 休假 ({daySchedule.off.length})
                                                    </div>
                                                    <button 
                                                        onClick={() => handleRandomRecall(day)}
                                                        className="text-[10px] bg-red-100 hover:bg-red-200 text-red-700 px-1.5 py-0.5 rounded border border-red-200 shadow-sm transition-colors flex items-center gap-1"
                                                        title="隨機召回一位休假人員"
                                                    >
                                                        🎲 抽籤
                                                    </button>
                                                </div>
                                                <div 
                                                    className="flex flex-wrap gap-1 min-h-[20px] p-0.5 rounded border border-transparent hover:border-dashed hover:border-red-300 transition-colors"
                                                    onDragOver={(e) => e.preventDefault()}
                                                    onDrop={(e) => handleDrop(e, day, 'off')}
                                                >
                                                    {daySchedule.off.map(s => (
                                                        <span 
                                                            key={s.id} draggable 
                                                            onDragStart={(e) => handleDragStart(e, day, 'off', s.id)} onDragEnd={handleDragEnd}
                                                            className="text-[10px] px-1 bg-red-50 text-red-600 rounded border border-red-100 cursor-move shadow-sm"
                                                        >{s.name}</span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="text-center text-gray-300 mt-4">未排班</div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                );
            };

            const renderStats = () => {
                const totalShifts = stats.reduce((acc, curr) => acc + curr.nightShiftCount, 0);
                const avgShifts = totalShifts / (stats.length || 1);
                const totalHZ = stats.reduce((acc, curr) => acc + curr.haizongCount, 0);
                const avgHZ = totalHZ / (stats.length || 1);
                const totalGY = stats.reduce((acc, curr) => acc + curr.gaoyiCount, 0);
                const avgGY = totalGY / (stats.length || 1);

                return (
                    <div className="bg-white p-4 rounded-lg shadow-sm mt-6">
                        <h3 className="font-bold text-gray-700 flex items-center gap-2 mb-4">
                            <BarChart3Icon size={20} /> 排班統計
                        </h3>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-gray-100 text-gray-600">
                                    <tr>
                                        <th className="p-2">姓名</th>
                                        <th className="p-2">職位</th>
                                        <th className="p-2 text-center text-red-600">休假</th>
                                        <th className="p-2 text-center text-slate-800 font-bold">夜班總數 (均{avgShifts.toFixed(1)})</th>
                                        <th className="p-2 text-center text-blue-600">海總 (均{avgHZ.toFixed(1)})</th>
                                        <th className="p-2 text-center text-green-600">高醫 (均{avgGY.toFixed(1)})</th>
                                        <th className="p-2 text-center text-orange-600">被召回次數</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {stats.sort((a,b) => b.nightShiftCount - a.nightShiftCount).map(s => (
                                        <tr key={s.id} className="border-b hover:bg-gray-50">
                                            <td className="p-2 font-medium">{s.name}</td>
                                            <td className="p-2 text-xs text-gray-500">{s.role === 'mortician' ? '禮儀師' : '助理'}</td>
                                            <td className={`p-2 text-center font-bold ${s.offCount < 5 ? 'text-red-500 bg-red-100' : (s.offCount > 5 ? 'text-blue-600' : 'text-green-600')}`}>{s.offCount}</td>
                                            <td className={`p-2 text-center font-bold text-lg ${Math.abs(s.nightShiftCount - avgShifts) > 2 ? 'text-red-500' : 'text-slate-800'}`}>{s.nightShiftCount}</td>
                                            <td className={`p-2 text-center ${Math.abs(s.haizongCount - avgHZ) > 3 ? 'text-red-500 font-bold' : 'text-blue-600'}`}>{s.haizongCount}</td>
                                            <td className={`p-2 text-center ${Math.abs(s.gaoyiCount - avgGY) > 3 ? 'text-red-500 font-bold' : 'text-green-600'}`}>{s.gaoyiCount}</td>
                                            <td className="p-2 text-center font-bold text-orange-500">{s.recallCount > 0 ? s.recallCount : '-'}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            <div className="text-xs text-gray-500 mt-2 text-right">
                                * 手動拖曳調整人員後，上方表格數據會即時更新。
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-gray-50 p-6 font-sans">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-6 flex flex-wrap justify-between items-center bg-white p-4 rounded-lg shadow-sm gap-4">
                            <div>
                                <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                                    <MoonIcon className="text-indigo-600" /> 崧鶴排班
                                </h1>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex items-center gap-1 bg-gray-100 rounded-md p-1">
                                    <button onClick={() => changeMonth(-1)} className="p-1 hover:bg-white rounded shadow-sm"><ChevronLeftIcon size={20}/></button>
                                    <select value={currentDate.getFullYear()} onChange={handleYearChange} className="bg-transparent font-bold text-gray-700 text-lg border-none focus:ring-0 cursor-pointer">
                                        {Array.from({length: 10}, (_, i) => 2026 + i).map(y => <option key={y} value={y}>{y}年</option>)}
                                    </select>
                                    <select value={currentDate.getMonth()} onChange={handleMonthChange} className="bg-transparent font-bold text-gray-700 text-lg border-none focus:ring-0 cursor-pointer">
                                        {Array.from({length: 12}, (_, i) => i).map(m => <option key={m} value={m}>{m + 1}月</option>)}
                                    </select>
                                    <button onClick={() => changeMonth(1)} className="p-1 hover:bg-white rounded shadow-sm"><ChevronRightIcon size={20}/></button>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setActiveTab('calendar')} className={`px-4 py-2 rounded-md flex items-center gap-2 ${activeTab === 'calendar' ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-600'}`}>
                                        <CalendarIcon size={18} /> 排班表
                                    </button>
                                    <button onClick={() => setActiveTab('staff')} className={`px-4 py-2 rounded-md flex items-center gap-2 ${activeTab === 'staff' ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-600'}`}>
                                        <UsersIcon size={18} /> 人員設定
                                    </button>
                                </div>
                            </div>
                        </header>

                        {activeTab === 'calendar' && (
                            <div className="space-y-4">
                                <div className="flex flex-wrap justify-between items-center bg-white p-4 rounded-lg shadow-sm gap-4">
                                    <div className="flex flex-wrap gap-4 text-sm text-gray-600">
                                        <div className="font-bold text-gray-800">操作說明：</div>
                                        <div className="flex items-center gap-1 text-red-500">🎲 點擊隨機抽籤召回</div>
                                    </div>
                                    <div className="flex gap-2">
                                        <label className="flex items-center gap-2 cursor-pointer text-sm font-bold text-gray-700 bg-indigo-50 px-3 py-2 rounded-md hover:bg-indigo-100 border border-indigo-100 transition-colors">
                                            <input type="checkbox" checked={autoAdjustMode} onChange={(e) => setAutoAdjustMode(e.target.checked)} className="w-4 h-4 text-indigo-600 rounded cursor-pointer" />
                                            連動調整模式
                                        </label>
                                        <button onClick={() => {setSchedule({}); setStats([]);}} className="px-4 py-2 text-red-600 hover:bg-red-50 rounded-md flex items-center gap-2 border border-red-200">
                                            <Trash2Icon size={18} /> 清空
                                        </button>
                                        <button onClick={generateSchedule} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md flex items-center gap-2 shadow-sm">
                                            <RefreshCwIcon size={18} /> 自動生成
                                        </button>
                                    </div>
                                </div>

                                {logs.length > 0 && (
                                    <div className="bg-yellow-50 border border-yellow-200 p-4 rounded-lg mb-4 text-sm text-yellow-800">
                                        <h3 className="font-bold flex items-center gap-2 mb-2"><ShieldAlertIcon size={16}/> 系統訊息</h3>
                                        <ul className="list-disc pl-5 max-h-24 overflow-y-auto">{logs.map((log, idx) => <li key={idx}>{log}</li>)}</ul>
                                    </div>
                                )}

                                <div className="bg-white p-4 rounded-lg shadow-sm overflow-hidden">
                                    {renderCalendar()}
                                </div>
                                {stats.length > 0 && renderStats()}
                            </div>
                        )}

                        {activeTab === 'staff' && (
                            <div className="bg-white p-6 rounded-lg shadow-sm">
                                <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><SettingsIcon className="text-gray-600" /> 人員管理</h2>
                                <div className="mb-6 p-4 bg-indigo-50 rounded-lg text-sm text-indigo-800">
                                    <h3 className="font-bold mb-2">設定說明：</h3>
                                    <ul className="list-disc pl-5 space-y-1">
                                        <li>點擊日期可設定「自選假」（每人最多 6 天）。</li>
                                    </ul>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="border-b-2 border-gray-200 bg-gray-50">
                                                <th className="p-3">姓名</th>
                                                <th className="p-3">職位</th>
                                                <th className="p-3">指定自選假</th>
                                                <th className="p-3">指定排班 (夜班跳脫連2休)</th>
                                                <th className="p-3 text-right">刪除</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {staffList.map(staff => (
                                                <tr key={staff.id} className="border-b border-gray-100 hover:bg-gray-50">
                                                    <td className="p-3 font-medium">{staff.name}</td>
                                                    <td className="p-3"><span className={`px-2 py-1 rounded text-xs ${staff.role==='mortician'?'bg-purple-100 text-purple-800':'bg-cyan-100 text-cyan-800'}`}>{staff.role==='mortician'?'禮儀師':'助理'}</span></td>
                                                    <td className="p-3">
                                                        <div className="flex flex-wrap gap-1">
                                                            {staff.preferredOff.map(d => <span key={d} onClick={()=>togglePreferredOff(staff.id, d)} className="bg-red-100 text-red-700 px-2 py-1 rounded-full text-xs cursor-pointer hover:bg-red-200 flex items-center gap-1">{d}號 x</span>)}
                                                            {staff.preferredOff.length < 6 && (
                                                                <select className="text-xs border rounded px-1 py-1 bg-white" onChange={(e)=>{if(e.target.value) togglePreferredOff(staff.id, parseInt(e.target.value)); e.target.value="";}}>
                                                                    <option value="">+假</option>
                                                                    {Array.from({length: 31}, (_,i)=>i+1).map(d => !staff.preferredOff.includes(d) && <option key={d} value={d}>{d}號</option>)}
                                                                </select>
                                                            )}
                                                        </div>
                                                    </td>
                                                    <td className="p-3">
                                                        <div className="flex flex-wrap gap-1 items-center">
                                                            {staff.designatedShifts?.map(ds => (
                                                                <span key={ds.date} onClick={()=>removeDesignatedShift(staff.id, ds.date)} className={`px-2 py-1 rounded-full text-xs cursor-pointer flex items-center gap-1 ${ds.location === '待命' ? 'bg-blue-100 text-blue-700 hover:bg-blue-200' : 'bg-indigo-100 text-indigo-700 hover:bg-indigo-200'}`}>
                                                                    {ds.date}號 {ds.location} x
                                                                </span>
                                                            ))}
                                                            <div className="flex items-center border rounded bg-white overflow-hidden shadow-sm">
                                                                <select id={`ds-date-${staff.id}`} className="text-xs p-1 focus:outline-none bg-transparent cursor-pointer">
                                                                    <option value="">日期</option>
                                                                    {Array.from({length: 31}, (_,i)=>i+1).map(d => <option key={d} value={d}>{d}</option>)}
                                                                </select>
                                                                <select id={`ds-loc-${staff.id}`} className="text-xs p-1 focus:outline-none bg-transparent border-l cursor-pointer">
                                                                    <option value="海總">海總</option>
                                                                    <option value="高醫">高醫</option>
                                                                    <option value="待命">待命</option>
                                                                </select>
                                                                <button onClick={() => {
                                                                    const d = document.getElementById(`ds-date-${staff.id}`).value;
                                                                    const l = document.getElementById(`ds-loc-${staff.id}`).value;
                                                                    if (d && l) {
                                                                        addDesignatedShift(staff.id, parseInt(d), l);
                                                                        document.getElementById(`ds-date-${staff.id}`).value = '';
                                                                    }
                                                                }} className="text-xs bg-gray-100 hover:bg-gray-200 p-1 px-2 border-l transition-colors">+</button>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="p-3 text-right"><button onClick={()=>handleRemoveStaff(staff.id)} className="text-gray-400 hover:text-red-500"><Trash2Icon size={16}/></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="mt-6 p-4 bg-gray-100 rounded-lg flex items-end gap-3">
                                    <div><label className="block text-xs font-bold text-gray-500 mb-1">姓名</label><input id="newName" type="text" className="border rounded p-2 text-sm" placeholder="輸入姓名" /></div>
                                    <div><label className="block text-xs font-bold text-gray-500 mb-1">職位</label><select id="newRole" className="border rounded p-2 text-sm"><option value="mortician">禮儀師</option><option value="assistant">助理</option></select></div>
                                    <button onClick={()=>{const n=document.getElementById('newName').value; const r=document.getElementById('newRole').value; if(n){handleAddStaff(n,r); document.getElementById('newName').value='';}}} className="bg-green-600 text-white px-4 py-2 rounded-md text-sm hover:bg-green-700 flex items-center gap-1"><PlusIcon size={16}/> 新增</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
